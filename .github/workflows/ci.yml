name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-build:
    name: Web build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Upload dist artifact
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4
        with:
          name: oyna-web-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

  hub-smoke:
    name: Hub smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run hub smoke tests
        run: npm run test:hub

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs:
      - web-build
      - hub-smoke

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: oyna-web:ci
          build-args: |
            VITE_BASE_PATH=/
          cache-from: type=gha
          cache-to: type=gha,mode=max

  pipeline-summary:
    name: Pipeline summary
    runs-on: ubuntu-latest
    needs:
      - web-build
      - hub-smoke
      - dependency-audit
      - docker-build
    if: always()

    steps:
      - name: Write summary
        run: |
          {
            echo "## OYNA CI summary"
            echo "- Web build matrix: ${{ needs.web-build.result }}"
            echo "- Hub smoke tests: ${{ needs.hub-smoke.result }}"
            echo "- Dependency audit: ${{ needs.dependency-audit.result }}"
            echo "- Docker image build: ${{ needs.docker-build.result }}"
            echo "- Dist artifact: uploaded from the Node 22 build when the build succeeds"
          } >> "$GITHUB_STEP_SUMMARY"